<!--
Social preview / OG image — locked at 1200x630 for Twitter/X cards,
GitHub repo-card hero, and og:image. Distinct from the README banner
(1200x420), which runs in a column much narrower than 1200px.

Render to PNG with:
    rsvg-convert -w 1200 -h 630 front/social-preview.svg -o front/social-preview.png
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630"
     font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif">
  <rect width="1200" height="630" fill="#0A0E1A"/>

  <!-- Subtle horizon -->
  <g stroke="rgba(79,248,210,0.06)" stroke-width="1">
    <line x1="0" y1="90"  x2="1200" y2="90"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Helm-wheel mark — centered, large. -->
  <g transform="translate(220, 315)">
    <circle cx="0" cy="0" r="118" fill="none" stroke="#4FF8D2" stroke-width="7"/>
    <circle cx="0" cy="0" r="94" fill="none" stroke="#4FF8D2" stroke-width="3" opacity="0.4"/>
    <g stroke="#4FF8D2" stroke-width="6" stroke-linecap="round">
      <line x1="0" y1="-118" x2="0" y2="118"/>
      <line x1="-118" y1="0" x2="118" y2="0"/>
      <line x1="-83.4" y1="-83.4" x2="83.4" y2="83.4"/>
      <line x1="-83.4" y1="83.4"  x2="83.4" y2="-83.4"/>
    </g>
    <circle cx="0" cy="0" r="18" fill="#0A0E1A" stroke="#4FF8D2" stroke-width="6"/>
    <g stroke="#4FF8D2" stroke-width="7" stroke-linecap="round">
      <line x1="0" y1="-124" x2="0" y2="-150"/>
      <line x1="0" y1="124" x2="0" y2="150"/>
      <line x1="-124" y1="0" x2="-150" y2="0"/>
      <line x1="124" y1="0" x2="150" y2="0"/>
    </g>
  </g>

  <!-- Right-side text block -->
  <text x="430" y="270" fill="#FFFFFF" font-size="118" font-weight="800" letter-spacing="-0.025em">
    Helm
  </text>

  <text x="432" y="328" fill="#9CA3AF" font-size="28" font-weight="500">
    Llama 4 + MCP co-pilot for SMB ops.
  </text>

  <text x="432" y="408" fill="#FFFFFF" font-size="22" font-weight="600">
    Four back-office workflows.
  </text>
  <text x="432" y="442" fill="#FFFFFF" font-size="22" font-weight="600">
    Measured cost and accuracy per task.
  </text>

  <text x="432" y="528" fill="#4FF8D2" font-size="14" font-weight="700" letter-spacing="0.2em">
    github.com/Builder106/Helm
  </text>
</svg>
